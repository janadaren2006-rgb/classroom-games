<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Countdown to Summer 🌴</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  position: relative;
}

/* ── SKY GRADIENT ── */
.sky {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(
    180deg,
    #1a6eb5 0%,
    #2e8ecf 25%,
    #5ba8d8 45%,
    #f4c97a 65%,
    #f4956a 78%,
    #e8735a 88%,
    #c5566e 100%
  );
  animation: skyShift 20s ease-in-out infinite alternate;
}
@keyframes skyShift {
  0%   { filter: hue-rotate(0deg) brightness(1); }
  50%  { filter: hue-rotate(10deg) brightness(1.05); }
  100% { filter: hue-rotate(-5deg) brightness(0.95); }
}

/* ── SUN ── */
.sun {
  position: fixed; top: 8%; right: 12%;
  width: 90px; height: 90px; z-index: 1;
  animation: sunFloat 6s ease-in-out infinite;
}
.sun-core {
  width: 90px; height: 90px; border-radius: 50%;
  background: radial-gradient(circle, #fff9c4, #ffd54f, #ffab40);
  box-shadow: 0 0 40px 20px rgba(255,200,50,0.5), 0 0 80px 40px rgba(255,160,30,0.2);
}
.sun-ray {
  position: absolute; top: 50%; left: 50%;
  width: 4px; border-radius: 2px;
  background: rgba(255,220,80,0.6);
  transform-origin: bottom center;
}
@keyframes sunFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* ── CLOUDS ── */
.cloud {
  position: fixed; z-index: 2;
  background: rgba(255,255,255,0.85);
  border-radius: 50px;
  animation: cloudDrift linear infinite;
}
.cloud::before, .cloud::after {
  content: ''; position: absolute;
  background: rgba(255,255,255,0.85);
  border-radius: 50%;
}
@keyframes cloudDrift { from{transform:translateX(-300px)} to{transform:translateX(110vw)} }

/* ── OCEAN ── */
.ocean {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 28%; z-index: 3;
  overflow: hidden;
}
.wave {
  position: absolute; width: 200%; height: 100%;
  background: linear-gradient(180deg, rgba(32,130,180,0.9) 0%, rgba(15,80,130,0.95) 100%);
  border-radius: 40% 40% 0 0 / 20px 20px 0 0;
  animation: waveMove linear infinite;
}
.wave1 { top: 0; animation-duration: 8s; background: rgba(64,164,214,0.7); border-radius: 45% 45% 0 0 / 30px 30px 0 0; }
.wave2 { top: 8px; animation-duration: 11s; animation-direction: reverse; background: rgba(32,130,180,0.6); }
.wave3 { top: 16px; animation-duration: 14s; background: rgba(15,90,150,0.8); }
@keyframes waveMove { from{transform:translateX(-50%)} to{transform:translateX(0)} }

/* ── BEACH ── */
.beach {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 18%; z-index: 4;
  background: linear-gradient(180deg, #f5d87a 0%, #e8c55a 40%, #d4a843 100%);
  border-radius: 60% 60% 0 0 / 40px 40px 0 0;
}

/* ── PALM TREES ── */
.palm {
  position: fixed; bottom: 15%; z-index: 5;
  font-size: 5rem;
  animation: palmSway 4s ease-in-out infinite;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3));
  user-select: none;
}
.palm-left  { left: 2%; animation-delay: 0s; }
.palm-right { right: 2%; animation-delay: 1s; transform-origin: bottom center; }
@keyframes palmSway { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }

/* ── SEAGULLS ── */
.gull {
  position: fixed; z-index: 6; font-size: 1.4rem;
  animation: gullFly linear infinite;
  opacity: 0.8;
}
@keyframes gullFly {
  0%   { transform: translateX(-80px) translateY(0); opacity:0; }
  10%  { opacity: 0.8; }
  50%  { transform: translateX(50vw) translateY(-20px); }
  90%  { opacity: 0.8; }
  100% { transform: translateX(110vw) translateY(10px); opacity:0; }
}

/* ── MAIN CONTENT ── */
.content {
  position: relative; z-index: 10;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px 20px 120px;
}

/* ── MAIN CARD ── */
.main-card {
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 32px;
  padding: 40px 48px;
  text-align: center;
  max-width: 700px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.4);
  margin-bottom: 20px;
}

.headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  color: rgba(255,255,255,0.9);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.big-number {
  font-family: 'Playfair Display', serif;
  font-size: clamp(5rem, 18vw, 10rem);
  font-weight: 900;
  color: #ffffff;
  line-height: 0.9;
  text-shadow: 0 4px 30px rgba(0,0,0,0.25), 0 0 60px rgba(255,255,255,0.2);
  margin: 10px 0;
  animation: numberPulse 2s ease-in-out infinite;
}
@keyframes numberPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.01)} }

.days-label {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  color: rgba(255,255,255,0.95);
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  margin-bottom: 20px;
}

/* ── HMS ROW ── */
.hms-row {
  display: flex; gap: 16px; justify-content: center;
  margin-bottom: 24px;
}
.hms-unit {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 16px; padding: 12px 20px;
  min-width: 80px;
}
.hms-num {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 700; color: #fff;
  line-height: 1;
}
.hms-lbl {
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(255,255,255,0.7);
  margin-top: 4px;
}

/* ── AFFIRMATION ── */
.affirmation {
  font-size: clamp(0.95rem, 2vw, 1.1rem);
  color: rgba(255,255,255,0.95);
  font-weight: 700;
  font-style: italic;
  background: rgba(255,255,255,0.15);
  border-radius: 50px;
  padding: 10px 24px;
  display: inline-block;
  border: 1px solid rgba(255,255,255,0.25);
}

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  max-width: 700px; width: 100%;
  margin-bottom: 20px;
}
.stat-card {
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px; padding: 18px 10px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}
.stat-emoji { font-size: 1.6rem; margin-bottom: 6px; }
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.3rem, 3vw, 1.8rem);
  font-weight: 700; color: #fff;
  line-height: 1; margin-bottom: 4px;
}
.stat-label {
  font-size: 11px; letter-spacing: 1px;
  color: rgba(255,255,255,0.75);
  text-transform: uppercase; font-weight: 600;
}

/* ── PROGRESS BAR ── */
.progress-wrap {
  max-width: 700px; width: 100%; margin-bottom: 20px;
}
.progress-top {
  display: flex; justify-content: space-between;
  font-size: 12px; color: rgba(255,255,255,0.8);
  margin-bottom: 6px; font-weight: 700; letter-spacing: 0.5px;
}
.progress-track {
  height: 10px;
  background: rgba(255,255,255,0.2);
  border-radius: 5px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.25);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ffd54f, #ffab40, #ff7043);
  border-radius: 5px;
  transition: width 1s ease;
  position: relative; overflow: hidden;
}
.progress-fill::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
  animation: shimmer 2s linear infinite;
}
@keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

/* ── MILESTONE ── */
.milestone {
  background: rgba(255,220,50,0.25);
  border: 1px solid rgba(255,220,50,0.5);
  border-radius: 16px; padding: 12px 24px;
  margin-bottom: 16px;
  font-size: 14px; font-weight: 700;
  color: #fff;
  text-align: center;
  max-width: 700px; width: 100%;
  display: none;
}
.milestone.show { display: block; animation: popIn 0.4s ease; }
@keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }

/* ── SETTINGS ── */
.settings-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 20;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 50%; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.2rem;
  transition: background 0.2s;
}
.settings-toggle:hover { background: rgba(255,255,255,0.35); }

.settings-panel {
  position: fixed; top: 68px; right: 16px; z-index: 20;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
  border-radius: 20px; padding: 20px 24px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  display: none; min-width: 260px;
}
.settings-panel.open { display: block; animation: popIn 0.2s ease; }
.settings-title { font-weight: 800; font-size: 14px; color: #333; margin-bottom: 14px; }
.settings-field { margin-bottom: 12px; }
.settings-field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #888; margin-bottom: 6px; }
.settings-field input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; color: #333; }
.settings-field input:focus { outline: none; border-color: #f4956a; }
.save-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, #f4956a, #c5566e); color: white; border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
.save-btn:hover { opacity: 0.9; }

/* ── FIREWORKS (end state) ── */
.firework {
  position: fixed; z-index: 50; pointer-events: none;
  width: 6px; height: 6px; border-radius: 50%;
  animation: explode 1.5s ease-out forwards;
}
@keyframes explode {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}
</style>
</head>
<body>

<!-- Background layers -->
<div class="sky"></div>
<div class="sun">
  <div class="sun-core"></div>
</div>
<div class="ocean">
  <div class="wave wave1"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>
</div>
<div class="beach"></div>
<div class="palm palm-left">🌴</div>
<div class="palm palm-right">🌴</div>

<!-- Settings -->
<div class="settings-toggle" onclick="toggleSettings()">⚙️</div>
<div class="settings-panel" id="settings">
  <div class="settings-title">⚙️ Settings</div>
  <div class="settings-field">
    <label>Last Day of School</label>
    <input type="date" id="end-date-input"/>
  </div>
  <div class="settings-field">
    <label>Your Name / School</label>
    <input type="text" id="name-input" placeholder="e.g. Chingshin Academy"/>
  </div>
  <button class="save-btn" onclick="saveSettings()">Save ✓</button>
</div>

<!-- Main content -->
<div class="content">

  <div class="milestone" id="milestone"></div>

  <div class="main-card">
    <div class="headline" id="headline">☀️ Countdown to Summer</div>
    <div class="big-number" id="big-days">--</div>
    <div class="days-label">Days to Go</div>
    <div class="hms-row">
      <div class="hms-unit"><div class="hms-num" id="hms-h">--</div><div class="hms-lbl">Hours</div></div>
      <div class="hms-unit"><div class="hms-num" id="hms-m">--</div><div class="hms-lbl">Mins</div></div>
      <div class="hms-unit"><div class="hms-num" id="hms-s">--</div><div class="hms-lbl">Secs</div></div>
    </div>
    <div class="affirmation" id="affirmation">Loading your daily boost...</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-emoji">📅</div>
      <div class="stat-num" id="stat-mondays">--</div>
      <div class="stat-label">Mondays Left</div>
    </div>
    <div class="stat-card">
      <div class="stat-emoji">📊</div>
      <div class="stat-num" id="stat-pct">--%</div>
      <div class="stat-label">Year Complete</div>
    </div>
    <div class="stat-card">
      <div class="stat-emoji">☕</div>
      <div class="stat-num" id="stat-coffees">--</div>
      <div class="stat-label">Coffees Needed</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-top">
      <span id="prog-start">Sep 1</span>
      <span id="prog-pct-label">0% of the year done</span>
      <span id="prog-end">Jun 30 🏖️</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

</div>

<script>
// ── DEFAULTS ──────────────────────────────────────────────────────────────────
const DEFAULT_END   = "2026-06-30";
const DEFAULT_START = "2025-09-01"; // approximate school year start
const COFFEES_PER_DAY = 2;

// ── AFFIRMATIONS ──────────────────────────────────────────────────────────────
const affirmations = [
  "You are literally shaping the future. One lesson at a time. 🌟",
  "The best teachers don't just teach subjects — they teach humans. That's you. 💛",
  "Somewhere a student still thinks about something you said. 🎓",
  "You've survived 100% of your hard days so far. Perfect record. 💪",
  "Sandy toes and zero lesson plans are almost within reach. 🏖️",
  "You don't just have a job. You have a calling. And summer. 🌴",
  "The school year is like a coconut — hard on the outside, but worth it. 🥥",
  "Think about how good that first day of summer is going to feel. ☀️",
  "Every student you believe in believes in themselves a little more. ✨",
  "You're not just counting down. You're finishing strong. 🏁",
  "No meetings. No marking. No Monday alarm. Soon. Very soon. 😌",
  "A little progress each day adds up to big results — and big vacations. 🧳",
  "The ocean is waiting. It has been patient. You've been patient too. 🌊",
  "You've answered more questions this year than Google. Respect. 🔍",
  "Summer doesn't care about your inbox. And soon, neither will you. 📭",
  "Your future self on a beach chair sends their deepest gratitude. 🪑",
  "Plot twist: the real treasure was the summer you earned along the way. 💎",
  "You're in the final chapters. Make them count. 📖",
  "The countdown is real. The beach is real. YOU are real. 🌞",
  "Hang in there. The forecast is 100% sunshine with a chance of zero responsibilities. ⛅",
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let endDate   = new Date(localStorage.getItem('summer_end')   || DEFAULT_END);
let startDate = new Date(DEFAULT_START);
let userName  = localStorage.getItem('summer_name') || '';
let tickTimer;

// ── SEAGULLS ─────────────────────────────────────────────────────────────────
function makeGulls() {
  for (let i = 0; i < 4; i++) {
    const g = document.createElement('div');
    g.className = 'gull';
    g.textContent = '🕊️';
    g.style.top  = (8 + Math.random() * 25) + '%';
    g.style.animationDuration  = (18 + Math.random() * 20) + 's';
    g.style.animationDelay     = (Math.random() * 20) + 's';
    g.style.fontSize = (0.9 + Math.random() * 0.8) + 'rem';
    document.body.appendChild(g);
  }
}

// ── SUN RAYS ─────────────────────────────────────────────────────────────────
function makeSunRays() {
  const sun = document.querySelector('.sun');
  for (let i = 0; i < 12; i++) {
    const ray = document.createElement('div');
    ray.className = 'sun-ray';
    const len = 18 + Math.random() * 14;
    ray.style.cssText = `
      height: ${len}px;
      margin-left: -2px;
      margin-top: ${-(45 + len)}px;
      transform: rotate(${i * 30}deg);
    `;
    sun.appendChild(ray);
  }
}

// ── CLOUDS ───────────────────────────────────────────────────────────────────
function makeClouds() {
  const configs = [
    { top:'8%',  w:160, h:40, dur:45, delay:-10 },
    { top:'14%', w:220, h:55, dur:60, delay:-25 },
    { top:'6%',  w:120, h:30, dur:35, delay:-5  },
    { top:'18%', w:180, h:45, dur:55, delay:-40 },
  ];
  configs.forEach(c => {
    const el = document.createElement('div');
    el.className = 'cloud';
    el.style.cssText = `
      top:${c.top}; width:${c.w}px; height:${c.h}px;
      animation-duration:${c.dur}s; animation-delay:${c.delay}s;
    `;
    el.style.before = '';
    document.body.appendChild(el);
  });
}

// ── DAILY AFFIRMATION (same all day, changes daily) ──────────────────────────
function getAffirmation() {
  const day = Math.floor(Date.now() / 86400000);
  return affirmations[day % affirmations.length];
}

// ── MILESTONES ────────────────────────────────────────────────────────────────
function checkMilestone(days) {
  const milestones = {
    60: "🎉 60 days! The finish line is in sight!",
    30: "🏃 One month to go! You're in the home stretch!",
    20: "✨ 20 days! Start planning what you'll do first!",
    14: "🌴 Two weeks! Can you SMELL the sunscreen?",
    10: "🔥 10 days! Double digits no more soon!",
    7:  "🎊 One week left! SEVEN DAYS!",
    5:  "🌊 Five days! The ocean is calling!",
    3:  "⚡ THREE DAYS. Count them. THREE.",
    2:  "😱 TWO DAYS. This is not a drill.",
    1:  "🚨 TOMORROW IS THE LAST DAY! 🚨",
    0:  "🏖️ IT'S HERE! SUMMER HAS ARRIVED! 🎉🌴🎉",
  };
  const el = document.getElementById('milestone');
  if (milestones[days] !== undefined) {
    el.textContent = milestones[days];
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

// ── FIREWORKS (day 0) ─────────────────────────────────────────────────────────
function launchFireworks() {
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const fw = document.createElement('div');
      fw.className = 'firework';
      const colors = ['#ff6b6b','#ffd166','#06d6a0','#118ab2','#f4a261','#fff'];
      fw.style.background = colors[Math.floor(Math.random() * colors.length)];
      fw.style.left = (20 + Math.random() * 60) + 'vw';
      fw.style.top  = (10 + Math.random() * 50) + 'vh';
      const angle = Math.random() * Math.PI * 2;
      const dist  = 60 + Math.random() * 120;
      fw.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      fw.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      document.body.appendChild(fw);
      setTimeout(() => fw.remove(), 1600);
    }, Math.random() * 3000);
  }
}

// ── TICK ──────────────────────────────────────────────────────────────────────
function tick() {
  const now  = new Date();
  const end  = new Date(endDate);
  end.setHours(16, 0, 0, 0); // 4:00 PM last day

  const diffMs   = end - now;
  const totalDays = Math.max(0, Math.ceil(diffMs / 86400000));
  const diffSecs  = Math.max(0, Math.floor(diffMs / 1000));
  const hours     = Math.floor((diffSecs % 86400) / 3600);
  const mins      = Math.floor((diffSecs % 3600) / 60);
  const secs      = diffSecs % 60;

  // Big number
  document.getElementById('big-days').textContent = totalDays;
  document.getElementById('hms-h').textContent = String(hours).padStart(2,'0');
  document.getElementById('hms-m').textContent = String(mins).padStart(2,'0');
  document.getElementById('hms-s').textContent = String(secs).padStart(2,'0');

  // Mondays remaining
  let mondays = 0;
  const cur = new Date(now);
  while (cur <= end) {
    if (cur.getDay() === 1) mondays++;
    cur.setDate(cur.getDate() + 1);
  }
  document.getElementById('stat-mondays').textContent = mondays;

  // Coffees
  document.getElementById('stat-coffees').textContent = totalDays * COFFEES_PER_DAY;

  // Progress
  const yearStart = new Date(DEFAULT_START);
  const totalYear = end - yearStart;
  const elapsed   = now - yearStart;
  const pct       = Math.min(100, Math.max(0, Math.round((elapsed / totalYear) * 100)));
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('prog-pct-label').textContent = pct + '% of the year done';

  // End date label
  const endFmt = end.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  document.getElementById('prog-end').textContent = endFmt + ' 🏖️';

  // Headline
  const name = localStorage.getItem('summer_name') || '';
  document.getElementById('headline').textContent =
    name ? `☀️ ${name} — Countdown to Summer` : '☀️ Countdown to Summer';

  // Affirmation
  document.getElementById('affirmation').textContent = '"' + getAffirmation() + '"';

  // Milestone
  checkMilestone(totalDays);

  // Fireworks if done
  if (totalDays === 0 && secs === 0 && mins === 0 && hours === 0) {
    launchFireworks();
  }

  tickTimer = setTimeout(tick, 1000);
}

// ── SETTINGS ─────────────────────────────────────────────────────────────────
function toggleSettings() {
  document.getElementById('settings').classList.toggle('open');
}

function saveSettings() {
  const d = document.getElementById('end-date-input').value;
  const n = document.getElementById('name-input').value.trim();
  if (d) {
    endDate = new Date(d);
    localStorage.setItem('summer_end', d);
  }
  if (n !== undefined) localStorage.setItem('summer_name', n);
  document.getElementById('settings').classList.remove('open');
}

// ── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  // Pre-fill settings
  const saved = localStorage.getItem('summer_end') || DEFAULT_END;
  document.getElementById('end-date-input').value = saved;
  document.getElementById('name-input').value = localStorage.getItem('summer_name') || '';

  makeGulls();
  makeSunRays();
  makeClouds();
  tick();
};
</script>
</body>
